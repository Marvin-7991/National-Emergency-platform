services:
  # ── Auth Service ────────────────────────────────────────────
  - type: web
    name: ner-auth-service
    runtime: docker
    dockerfilePath: ./auth-service/Dockerfile
    dockerContext: ./auth-service
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URL
        sync: false   # Set in Render dashboard → use AUTH_MONGODB_URL value from .env
      - key: JWT_SECRET
        sync: false   # Set in Render dashboard

  # ── Incident Service ─────────────────────────────────────────
  - type: web
    name: ner-incident-service
    runtime: docker
    dockerfilePath: ./incident-service/Dockerfile
    dockerContext: ./incident-service
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URL
        sync: false   # Set in Render dashboard → use INCIDENT_MONGODB_URL value from .env
      - key: JWT_SECRET
        sync: false
      - key: RABBITMQ_URL
        sync: false   # Set in Render dashboard → use RABBITMQ_URL value from .env
      - key: DISPATCH_SERVICE_URL
        fromService:
          name: ner-dispatch-service
          type: web
          property: url

  # ── Dispatch Service ─────────────────────────────────────────
  - type: web
    name: ner-dispatch-service
    runtime: docker
    dockerfilePath: ./dispatch-service/Dockerfile
    dockerContext: ./dispatch-service
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: MONGODB_URL
        sync: false   # Set in Render dashboard → use DISPATCH_MONGODB_URL value from .env
      - key: JWT_SECRET
        sync: false
      - key: RABBITMQ_URL
        sync: false

  # ── Analytics Service ────────────────────────────────────────
  - type: web
    name: ner-analytics-service
    runtime: docker
    dockerfilePath: ./analytics-service/Dockerfile
    dockerContext: ./analytics-service
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: RABBITMQ_URL
        sync: false
      - key: INCIDENT_SERVICE_URL
        fromService:
          name: ner-incident-service
          type: web
          property: url
      - key: DISPATCH_SERVICE_URL
        fromService:
          name: ner-dispatch-service
          type: web
          property: url
